jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Docker 태그로 사용할 수 있도록 브랜치 이름 변환 (가장 중요한 부분)
      - name: Sanitize branch name for Docker tag
        id: sanitize # 👈 나중에 이 id를 사용해 결과값을 참조합니다.
        run: |
          TAG=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      # 3. AWS 자격 증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 4. Amazon ECR에 로그인
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      # 5. Docker 이미지 빌드, 태그 지정, ECR에 푸시
      - name: Build, tag, and push image to Amazon ECR
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # ❗ 2번 단계(id: sanitize)의 결과물(outputs.tag)을 태그로 사용합니다.
          tags: ${{ secrets.ECR_REPOSITORY_URI }}:${{ steps.sanitize.outputs.tag }}