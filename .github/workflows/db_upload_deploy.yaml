name: Deploy db_upload_server

on:
  push:
    branches:
      - dev
      - 'chore/**'
    paths:
      - 'db_upload_server/**'
      - '.github/workflows/db_upload_deploy.yaml'

jobs:
  build-and-push:
    name: Build db_upload_server and Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - name: Log image name and tag
        env:
          VERSION: ${{ github.sha }}
        run: |
          echo "Building and pushing image for service: db_upload_server"
          echo "Image URI: ${{ secrets.ECR_DB_UPLOAD_SERVER_URI }}"
          echo "SHA Tag: ${VERSION}"
          echo "Floating Tag: latest"
          echo "Full Image Names:"
          echo "  ${{ secrets.ECR_DB_UPLOAD_SERVER_URI }}:latest"
          echo "  ${{ secrets.ECR_DB_UPLOAD_SERVER_URI }}:${VERSION}"

      - name: Build, tag, and push image to Amazon ECR
        env:
          VERSION: ${{ github.sha }}
        uses: docker/build-push-action@v4
        with:
          context: ./db_upload_server
          push: true
          tags: |
            ${{ secrets.ECR_DB_UPLOAD_SERVER_URI }}:${{ env.VERSION }}
            ${{ secrets.ECR_DB_UPLOAD_SERVER_URI }}:latest