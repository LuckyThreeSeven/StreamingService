version: "3.8"

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8890:8890/udp"   # SRT 입력
      - "8888:8888"       # HLS, WebRTC 등
      - "1935:1935"       # RTMP
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ./recordings:/recordings   # 녹화 저장 경로
